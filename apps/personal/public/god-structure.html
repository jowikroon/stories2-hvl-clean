<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The God Structure — AI Empire Architecture</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0f;
            color: #e2e8f0;
            margin: 0;
            padding: 0;
        }

        .glass {
            background: rgba(18, 18, 26, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glow {
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.2);
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 10px rgba(34, 197, 94, 0.3); }
            50% { box-shadow: 0 0 20px rgba(34, 197, 94, 0.6); }
        }

        .status-live {
            animation: pulse-glow 2s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const STATUS = { done: "✅", doing: "🔧", todo: "📋", blocked: "⛔" };

        const palette = {
          bg: "#0a0a0f",
          card: "#12121a",
          cardHover: "#1a1a26",
          border: "#1e1e2e",
          accent: "#22c55e",
          accentDim: "#22c55e33",
          warn: "#f59e0b",
          warnDim: "#f59e0b22",
          error: "#ef4444",
          errorDim: "#ef444422",
          blue: "#3b82f6",
          blueDim: "#3b82f622",
          purple: "#a855f7",
          purpleDim: "#a855f722",
          text: "#e2e8f0",
          textDim: "#64748b",
          textMuted: "#475569",
        };

        const layers = [
          {
            id: "edge",
            label: "Edge / CDN",
            tech: "Cloudflare Pages",
            color: palette.accent,
            items: [
              "React 18 + Vite SPA",
              "hansvanleeuwen.com (HTTPS)",
              "Auto-deploy on push to main",
              "Cloudflare Analytics",
            ],
            status: "live",
          },
          {
            id: "backend",
            label: "Backend",
            tech: "Supabase",
            color: palette.blue,
            items: [
              "PostgreSQL — 22 tables, migrations",
              "Auth — admin users, email + OAuth",
              "Edge Functions (Content pipeline)",
              "Validation rules (Amazon DE/FR)",
            ],
            status: "live",
          },
          {
            id: "automation",
            label: "Automation",
            tech: "n8n on VPS",
            color: palette.purple,
            items: [
              "Claude Relay v2 (webhook gateway)",
              "Monitoring workflows (Docker, endpoints)",
              "Site Update Engine v3 (BJ Fogg + LLM)",
              "22 total workflows (7 active)",
            ],
            status: "live",
          },
          {
            id: "compute",
            label: "Compute",
            tech: "Hostinger VPS",
            color: palette.warn,
            items: [
              "Ubuntu 24.04 · 2 cores · 8GB RAM",
              "Docker: n8n, Ollama, Qdrant, AnythingLLM",
              "/opt/n8n-monitoring/ (Python scripts)",
              "Traefik reverse proxy",
            ],
            status: "live",
          },
          {
            id: "ai",
            label: "AI Models",
            tech: "Multi-provider",
            color: "#ec4899",
            items: [
              "Gemini API (via Edge Functions)",
              "Ollama local (qwen2.5:7b)",
              "Claude API (via relay + direct)",
              "AnythingLLM (RAG interface)",
            ],
            status: "live",
          },
        ];

        const connections = [
          { from: "edge", to: "backend", label: "Supabase JS Client", type: "data" },
          { from: "backend", to: "ai", label: "Edge Fn → Gemini/Claude", type: "ai" },
          { from: "automation", to: "compute", label: "SSH + Docker API", type: "infra" },
          { from: "automation", to: "backend", label: "Webhook → Supabase", type: "data" },
          { from: "edge", to: "automation", label: "n8n triggers", type: "event" },
        ];

        const tasks = [
          { id: 1, label: "God Structure Dashboard", status: STATUS.done, layer: "edge" },
          { id: 2, label: "Pull Ollama qwen2.5:7b model", status: STATUS.todo, layer: "compute" },
          { id: 3, label: "Activate SEO News Scraper workflow", status: STATUS.todo, layer: "automation" },
          { id: 4, label: "Deploy JSON Workflow Improver", status: STATUS.blocked, layer: "automation", blocker: "Needs qwen2.5:7b" },
          { id: 5, label: "Complete AutoSEO Brain v2", status: STATUS.doing, layer: "automation" },
          { id: 6, label: "Add RLS policies to 4 Supabase tables", status: STATUS.todo, layer: "backend" },
          { id: 7, label: "Rotate GitHub PAT", status: STATUS.todo, layer: "edge" },
          { id: 8, label: "Fix n8n reverse proxy (502 error)", status: STATUS.blocked, layer: "compute" },
        ];

        function GodStructureDashboard() {
          const [activeLayer, setActiveLayer] = useState(null);
          const [showTasks, setShowTasks] = useState(false);

          return (
            <div style={{ background: palette.bg, minHeight: "100vh", padding: "2rem" }}>
              <div style={{ marginBottom: "3rem" }}>
                <h1 style={{
                  fontSize: "3rem",
                  fontWeight: "bold",
                  color: palette.text,
                  marginBottom: "0.5rem"
                }}>
                  The God Structure
                </h1>
                <p style={{ fontSize: "1.25rem", color: palette.textDim }}>
                  Hans van Leeuwen AI Empire — Full Stack Architecture
                </p>
              </div>

              <div style={{
                display: "grid",
                gridTemplateColumns: "repeat(auto-fit, minmax(300px, 1fr))",
                gap: "1.5rem",
                marginBottom: "3rem"
              }}>
                {layers.map(layer => (
                  <div
                    key={layer.id}
                    className={`glass ${layer.status === 'live' ? 'status-live' : ''}`}
                    style={{
                      padding: "1.5rem",
                      borderRadius: "0.75rem",
                      cursor: "pointer",
                      transition: "all 0.3s ease",
                      borderLeft: `4px solid ${layer.color}`,
                    }}
                    onClick={() => setActiveLayer(activeLayer === layer.id ? null : layer.id)}
                    onMouseEnter={(e) => {
                      e.currentTarget.style.background = palette.cardHover;
                      e.currentTarget.style.transform = "translateY(-4px)";
                    }}
                    onMouseLeave={(e) => {
                      e.currentTarget.style.background = "rgba(18, 18, 26, 0.7)";
                      e.currentTarget.style.transform = "translateY(0)";
                    }}
                  >
                    <div style={{
                      display: "flex",
                      justifyContent: "space-between",
                      alignItems: "center",
                      marginBottom: "1rem"
                    }}>
                      <h3 style={{
                        fontSize: "1.25rem",
                        fontWeight: "600",
                        color: layer.color
                      }}>
                        {layer.label}
                      </h3>
                      <span style={{
                        padding: "0.25rem 0.75rem",
                        borderRadius: "9999px",
                        background: layer.status === 'live' ? palette.accentDim : palette.warnDim,
                        color: layer.status === 'live' ? palette.accent : palette.warn,
                        fontSize: "0.875rem",
                        fontWeight: "600"
                      }}>
                        {layer.status}
                      </span>
                    </div>

                    <p style={{
                      fontSize: "0.875rem",
                      color: palette.textMuted,
                      marginBottom: "1rem"
                    }}>
                      {layer.tech}
                    </p>

                    {activeLayer === layer.id && (
                      <ul style={{
                        margin: 0,
                        padding: "0 0 0 1.25rem",
                        fontSize: "0.875rem",
                        color: palette.textDim,
                        lineHeight: "1.75"
                      }}>
                        {layer.items.map((item, idx) => (
                          <li key={idx}>{item}</li>
                        ))}
                      </ul>
                    )}
                  </div>
                ))}
              </div>

              <div className="glass" style={{
                padding: "1.5rem",
                borderRadius: "0.75rem",
                marginBottom: "3rem"
              }}>
                <h2 style={{
                  fontSize: "1.5rem",
                  fontWeight: "600",
                  marginBottom: "1rem",
                  color: palette.text
                }}>
                  System Connections
                </h2>
                <div style={{ display: "flex", flexDirection: "column", gap: "0.75rem" }}>
                  {connections.map((conn, idx) => (
                    <div
                      key={idx}
                      style={{
                        display: "flex",
                        alignItems: "center",
                        gap: "1rem",
                        padding: "0.75rem",
                        background: palette.card,
                        borderRadius: "0.5rem",
                        border: `1px solid ${palette.border}`
                      }}
                    >
                      <span style={{
                        color: layers.find(l => l.id === conn.from)?.color || palette.textDim,
                        fontWeight: "600",
                        minWidth: "100px"
                      }}>
                        {layers.find(l => l.id === conn.from)?.label}
                      </span>
                      <span style={{ color: palette.textMuted }}>→</span>
                      <span style={{
                        color: layers.find(l => l.id === conn.to)?.color || palette.textDim,
                        fontWeight: "600",
                        minWidth: "100px"
                      }}>
                        {layers.find(l => l.id === conn.to)?.label}
                      </span>
                      <span style={{
                        marginLeft: "auto",
                        fontSize: "0.875rem",
                        color: palette.textDim,
                        fontStyle: "italic"
                      }}>
                        {conn.label}
                      </span>
                      <span style={{
                        padding: "0.25rem 0.5rem",
                        borderRadius: "0.25rem",
                        background: conn.type === 'ai' ? palette.purpleDim :
                                   conn.type === 'data' ? palette.blueDim : palette.warnDim,
                        color: conn.type === 'ai' ? palette.purple :
                               conn.type === 'data' ? palette.blue : palette.warn,
                        fontSize: "0.75rem",
                        fontWeight: "600"
                      }}>
                        {conn.type}
                      </span>
                    </div>
                  ))}
                </div>
              </div>

              <div className="glass" style={{
                padding: "1.5rem",
                borderRadius: "0.75rem"
              }}>
                <div style={{
                  display: "flex",
                  justifyContent: "space-between",
                  alignItems: "center",
                  marginBottom: "1rem"
                }}>
                  <h2 style={{
                    fontSize: "1.5rem",
                    fontWeight: "600",
                    color: palette.text
                  }}>
                    Active Tasks
                  </h2>
                  <button
                    onClick={() => setShowTasks(!showTasks)}
                    style={{
                      padding: "0.5rem 1rem",
                      background: palette.accent,
                      color: palette.bg,
                      border: "none",
                      borderRadius: "0.5rem",
                      fontWeight: "600",
                      cursor: "pointer"
                    }}
                  >
                    {showTasks ? "Hide" : "Show"} Tasks
                  </button>
                </div>

                {showTasks && (
                  <div style={{ display: "flex", flexDirection: "column", gap: "0.75rem" }}>
                    {tasks.map(task => (
                      <div
                        key={task.id}
                        style={{
                          display: "flex",
                          alignItems: "center",
                          gap: "1rem",
                          padding: "1rem",
                          background: palette.card,
                          borderRadius: "0.5rem",
                          border: `1px solid ${palette.border}`,
                          borderLeft: `4px solid ${layers.find(l => l.id === task.layer)?.color || palette.textDim}`
                        }}
                      >
                        <span style={{ fontSize: "1.5rem" }}>{task.status}</span>
                        <div style={{ flex: 1 }}>
                          <p style={{
                            fontWeight: "600",
                            color: palette.text,
                            marginBottom: "0.25rem"
                          }}>
                            {task.label}
                          </p>
                          {task.blocker && (
                            <p style={{
                              fontSize: "0.875rem",
                              color: palette.error,
                              fontStyle: "italic"
                            }}>
                              Blocker: {task.blocker}
                            </p>
                          )}
                        </div>
                        <span style={{
                          padding: "0.25rem 0.75rem",
                          borderRadius: "9999px",
                          background: palette.cardHover,
                          color: palette.textDim,
                          fontSize: "0.75rem"
                        }}>
                          {layers.find(l => l.id === task.layer)?.label}
                        </span>
                      </div>
                    ))}
                  </div>
                )}
              </div>

              <div style={{
                marginTop: "3rem",
                textAlign: "center",
                color: palette.textMuted,
                fontSize: "0.875rem"
              }}>
                <p>The God Structure — Autonomous AI Empire Architecture</p>
                <p style={{ marginTop: "0.5rem" }}>
                  Last updated: {new Date().toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                  })}
                </p>
              </div>
            </div>
          );
        }

        ReactDOM.render(<GodStructureDashboard />, document.getElementById('root'));
    </script>
</body>
</html>
