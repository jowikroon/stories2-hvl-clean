# secrets.manifest.yml — Sovereign AI Empire
# Safe to commit. Contains NO secret values — only metadata.
# Used by secrets_registry_verify workflow and Commander CLI.

version: "1.0"

variables:
  - name: N8N_BASE_URL
    default: "https://hansvanleeuwen.app.n8n.cloud"
    purpose: "n8n Cloud instance URL for API calls and webhook base"

  - name: SUPABASE_URL
    default: "https://oejeojzaakfhculcoqdh.supabase.co"
    purpose: "Supabase project URL"

  - name: VAULT_BASE_URL
    default: "http://localhost:4000"
    purpose: "Vault adapter HTTP endpoint"

  - name: N8N_HOST
    default: "0.0.0.0"
    purpose: "n8n listen host"

  - name: N8N_PORT
    default: "5678"
    purpose: "n8n listen port"

  - name: GENERIC_TIMEZONE
    default: "Europe/Amsterdam"
    purpose: "Default timezone for n8n schedules"

  - name: APP_ORIGIN
    default: "https://your-app.com"
    purpose: "App origin for OAuth redirects (e.g. https://your-app.com or http://localhost:5173)"

secrets:
  - name: N8N_API_KEY
    canonical_name: N8N_API_KEY
    source: ENV
    purpose: "n8n REST API authentication"
    required: true
    environments:
      - local
      - vps
    rotation_days: 90
    scopes: ["n8n-api", "commander"]

  - name: N8N_ENCRYPTION_KEY
    canonical_name: N8N_ENCRYPTION_KEY
    source: ENV
    purpose: "Encrypts n8n credentials at rest — set once, never change"
    required: true
    environments:
      - local
      - vps
    rotation_days: null
    scopes: ["n8n-server"]

  - name: SUPABASE_SERVICE_ROLE_KEY
    canonical_name: SUPABASE_SERVICE_ROLE_KEY
    source: ENV
    purpose: "Supabase service role for n8n nodes and edge functions"
    required: true
    environments:
      - local
      - vps
    rotation_days: 365
    scopes: ["n8n-supabase", "edge-functions", "ci"]

  - name: ANTHROPIC_API_KEY
    canonical_name: ANTHROPIC_API_KEY
    source: ENV
    purpose: "Anthropic Claude API for LangChain nodes"
    required: true
    environments:
      - local
      - vps
    rotation_days: 180
    scopes: ["n8n-anthropic"]

  - name: OPENAI_API_KEY
    canonical_name: OPENAI_API_KEY
    source: ENV
    purpose: "OpenAI / Groq-compatible API for LangChain nodes"
    required: true
    environments:
      - local
      - vps
    rotation_days: 180
    scopes: ["n8n-openai"]

  - name: GEMINI_API_KEY
    canonical_name: GEMINI_API_KEY
    source: ENV
    purpose: "Google Gemini API (AI Studio / Vertex) for edge functions and future Google control"
    required: false
    environments:
      - local
      - vps
    rotation_days: 180
    scopes: ["edge-functions", "google-control"]

  - name: GOOGLE_OAUTH_CLIENT_ID
    canonical_name: GOOGLE_OAUTH_CLIENT_ID
    source: ENV
    purpose: "Google OAuth client ID for google-agent Connect Google flow (Gmail/Sheets/Drive)"
    required: false
    environments:
      - local
      - vps
    rotation_days: 365
    scopes: ["edge-functions", "google-oauth"]

  - name: GOOGLE_OAUTH_CLIENT_SECRET
    canonical_name: GOOGLE_OAUTH_CLIENT_SECRET
    source: ENV
    purpose: "Google OAuth client secret for token exchange and refresh"
    required: false
    environments:
      - local
      - vps
    rotation_days: 365
    scopes: ["edge-functions", "google-oauth"]

  - name: GOOGLE_OAUTH_STATE_SECRET
    canonical_name: GOOGLE_OAUTH_STATE_SECRET
    source: ENV
    purpose: "Sign OAuth state to prevent CSRF (generate: openssl rand -hex 32)"
    required: false
    environments:
      - local
      - vps
    rotation_days: null
    scopes: ["edge-functions", "google-oauth"]

  - name: MONDAY_API_TOKEN
    canonical_name: MONDAY_API_TOKEN
    source: ENV
    purpose: "Monday.com API for n8n Monday nodes and edge functions"
    required: false
    environments:
      - local
      - vps
    rotation_days: 365
    scopes: ["n8n-monday", "edge-functions"]

  - name: CLOUDFLARE_API_TOKEN
    canonical_name: CLOUDFLARE_API_TOKEN
    source: ENV
    purpose: "Cloudflare API for Workers deploy, DNS, Zero Trust"
    required: false
    environments:
      - local
      - vps
    rotation_days: 365
    scopes: ["cloudflare"]

  - name: COMMANDER_WEBHOOK_TOKEN
    canonical_name: COMMANDER_WEBHOOK_TOKEN
    source: ENV
    purpose: "Shared secret for trigger-webhook and Commander CLI auth"
    required: true
    environments:
      - local
      - vps
    rotation_days: 90
    scopes: ["commander", "trigger-webhook"]

  - name: VAULT_MASTER_KEY
    canonical_name: VAULT_MASTER_KEY
    source: ENV
    purpose: "AES-256-GCM master key for vault adapter encryption"
    required: false
    environments:
      - local
      - vps
    rotation_days: null
    scopes: ["vault-adapter"]

  - name: FIRECRAWL_API_KEY
    canonical_name: FIRECRAWL_API_KEY
    source: ENV
    purpose: "Firecrawl web scraping API"
    required: false
    environments:
      - local
      - vps
    rotation_days: 365
    scopes: ["n8n-firecrawl"]

  - name: GRAFANA_PASSWORD
    canonical_name: GRAFANA_PASSWORD
    source: ENV
    purpose: "Grafana admin password (override default)"
    required: false
    environments:
      - local
      - vps
    rotation_days: 90
    scopes: ["grafana"]

# Policy: redaction, allowed sources, forbidden patterns (safe to commit — no secret values)
policy:
  redaction_patterns:
    - "API_KEY"
    - "TOKEN"
    - "SECRET"
    - "PASSWORD"
    - "Bearer "
    - "Authorization"
    - "Cookie"
    - "api_key"
    - "access_token"
  allowed_sources:
    - ENV
    - VAULT_REF
    - N8N_CRED
  forbidden_patterns:
    - "Bearer "
    - "sk-"
    - "ghp_"
    - "xoxb-"
    - "AKIA"

# Per-workflow requirements matrix
workflows:
  - name: intent-analysis
    file: "public/workflows/intent-analysis.json"
    required_secrets:
      - SUPABASE_SERVICE_ROLE_KEY
      - OPENAI_API_KEY
    required_variables:
      - SUPABASE_URL
    n8n_credentials:
      - type: supabaseApi
        name: "Prod - Supabase Service Role"
      - type: openAiApi
        name: "Prod - OpenAI"
      - type: gmailOAuth2
        name: "Prod - Gmail"

  - name: autoseo-brain-v2
    file: "public/workflows/autoseo-brain-v2.json"
    required_secrets:
      - ANTHROPIC_API_KEY
    required_variables:
      - N8N_BASE_URL
    n8n_credentials:
      - type: anthropicApi
        name: "AnthropicApi"
      - type: googleSheetsOAuth2Api
        name: "Prod - Google Sheets"

  - name: seo-audit-workflow
    file: "public/workflows/seo-audit-workflow.json"
    required_secrets:
      - OPENAI_API_KEY
    required_variables: []
    n8n_credentials:
      - type: openAiApi
        name: "Prod - OpenAI"
      - type: gmailOAuth2
        name: "Prod - Gmail"

  - name: product-title-optimizer
    file: "public/workflows/product-title-optimizer.json"
    required_secrets: []
    required_variables: []
    n8n_credentials:
      - type: googleSheetsOAuth2Api
        name: "Prod - Google Sheets"

  - name: monday-orchestrator
    file: "public/workflows/monday-orchestrator.json"
    required_secrets:
      - MONDAY_API_TOKEN
    required_variables:
      - N8N_BASE_URL
    n8n_credentials: []

  - name: secrets-registry-verify
    file: "n8n/workflows/secrets_registry_verify.json"
    required_secrets:
      - N8N_API_KEY
      - COMMANDER_WEBHOOK_TOKEN
    required_variables:
      - N8N_BASE_URL
      - VAULT_BASE_URL
    n8n_credentials: []

  - name: secrets-provisioner
    file: "n8n/workflows/secrets_provisioner.json"
    required_secrets:
      - COMMANDER_WEBHOOK_TOKEN
    required_variables:
      - VAULT_BASE_URL
    n8n_credentials: []

  - name: n8n-reconcile-retry
    file: "n8n/workflows/n8n_reconcile_retry.json"
    required_secrets:
      - COMMANDER_WEBHOOK_TOKEN
      - N8N_API_KEY
    required_variables:
      - N8N_BASE_URL
    n8n_credentials: []
