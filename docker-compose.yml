# hans-crafted-stories — Local-First VPS Stack (March 01 2026)
# All core AI runs privately on Hans-owned Hostinger VPS (Ollama + Qdrant + AnythingLLM)
# NOT on laptop, NOT on public cloud APIs for primary operations.
# Qdrant: http://VPS-IP:6333/dashboard
# AnythingLLM: http://VPS-IP:3001 → set LLM to http://ollama:11434 and Vector DB to http://qdrant:6333
# Google connect → AnythingLLM/Qdrant gives full private RAG on crafted stories.

services:
  n8n:
    image: n8nio/n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped
    networks:
      - hans-ai-net

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    networks:
      - hans-ai-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped
    networks:
      - hans-ai-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  anythingllm:
    image: mintplexlabs/anythingllm:latest
    ports:
      - "3001:3001"
    volumes:
      - anythingllm_storage:/app/server/storage
    environment:
      - STORAGE_DIR=/app/server/storage
    cap_add:
      - SYS_ADMIN
    restart: unless-stopped
    networks:
      - hans-ai-net
    depends_on:
      ollama:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 2g

volumes:
  n8n_data:
  ollama_models:
  qdrant_storage:
  anythingllm_storage:

networks:
  hans-ai-net:
    driver: bridge
